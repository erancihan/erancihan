<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AetherDownloader Settings</title>
  <style>
    body {
      width: 360px;
      min-height: 400px;
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100">
  <div id="app" class="p-5">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-aether-500 to-aether-700 flex items-center justify-center shadow-fab">
        <span class="text-xl">⬇</span>
      </div>
      <div>
        <h1 class="text-lg font-bold bg-gradient-to-r from-aether-300 to-aether-500 bg-clip-text text-transparent">AetherDownloader</h1>
        <p class="text-xs text-gray-500">Pixiv &amp; Zerochan</p>
      </div>
    </div>

    <!-- Download Path Section -->
    <div class="mb-5">
      <label class="block text-sm font-medium text-gray-400 mb-2" for="pixiv-path">Pixiv Download Folder</label>
      <input
        id="pixiv-path"
        type="text"
        class="w-full px-3 py-2 bg-gray-900 border border-gray-800 rounded-lg text-gray-100 text-sm focus:border-aether-500 focus:ring-1 focus:ring-aether-500/50 outline-none transition-colors"
        placeholder="pixiv"
      >
      <label class="block text-xs text-gray-500 mt-2 mb-1" for="pixiv-template">Folder template</label>
      <input
        id="pixiv-template"
        type="text"
        class="w-full px-3 py-1.5 bg-gray-900 border border-gray-800 rounded-lg text-gray-100 text-xs font-mono focus:border-aether-500 focus:ring-1 focus:ring-aether-500/50 outline-none transition-colors"
        placeholder="{userName}-{userId}/{workId}-{title}"
      >
      <p class="text-xs text-gray-600 mt-1">Tokens: {userName} {userId} {workId} {title} {type} {date}</p>
      <label class="block text-xs text-gray-500 mt-2 mb-1" for="pixiv-max-pages">Batch — API pages (bookmarks / search)</label>
      <input
        id="pixiv-max-pages"
        type="number"
        min="1"
        max="20"
        step="1"
        class="w-full px-3 py-1.5 bg-gray-900 border border-gray-800 rounded-lg text-gray-100 text-xs focus:border-aether-500 focus:ring-1 focus:ring-aether-500/50 outline-none transition-colors"
        value="1"
      >
    </div>

    <div class="mb-5">
      <label class="block text-sm font-medium text-gray-400 mb-2" for="zerochan-path">Zerochan Download Folder</label>
      <input
        id="zerochan-path"
        type="text"
        class="w-full px-3 py-2 bg-gray-900 border border-gray-800 rounded-lg text-gray-100 text-sm focus:border-aether-500 focus:ring-1 focus:ring-aether-500/50 outline-none transition-colors"
        placeholder="zerochan"
      >
      <label class="block text-xs text-gray-500 mt-2 mb-1" for="zerochan-template">Folder template</label>
      <input
        id="zerochan-template"
        type="text"
        class="w-full px-3 py-1.5 bg-gray-900 border border-gray-800 rounded-lg text-gray-100 text-xs font-mono focus:border-aether-500 focus:ring-1 focus:ring-aether-500/50 outline-none transition-colors"
        placeholder="{character}"
      >
      <p class="text-xs text-gray-600 mt-1">Tokens: {character} {id} {tag}</p>
    </div>

    <div class="mb-5">
      <label class="block text-sm text-gray-400 mb-1.5" for="zerochan-max-pages">Zerochan Batch — Pages to Crawl</label>
      <input
        id="zerochan-max-pages"
        type="number"
        min="1"
        max="20"
        step="1"
        class="w-full px-3 py-2 bg-gray-900 border border-gray-800 rounded-lg text-gray-100 text-sm focus:border-aether-500 focus:ring-1 focus:ring-aether-500/50 outline-none transition-colors"
        value="1"
      >
      <p class="text-xs text-gray-600 mt-1">The listing-page "Download all" button walks this many pages from the current one.</p>
    </div>

    <!-- Preview Settings -->
    <div class="mb-5">
      <h2 class="text-sm font-semibold text-gray-300 mb-3 uppercase tracking-wider">Preview</h2>

      <div class="flex items-center justify-between py-2">
        <span class="text-sm text-gray-400">Hover Preview</span>
        <label class="relative inline-flex items-center cursor-pointer" for="preview-enabled">
          <input type="checkbox" id="preview-enabled" class="sr-only peer" checked>
          <div class="w-9 h-5 bg-gray-700 peer-focus:ring-2 peer-focus:ring-aether-500/30 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-aether-600"></div>
        </label>
      </div>

      <div class="mt-2">
        <label class="block text-sm text-gray-400 mb-1.5" for="preview-delay">Preview Delay (ms)</label>
        <input
          id="preview-delay"
          type="number"
          min="100"
          max="2000"
          step="50"
          class="w-full px-3 py-2 bg-gray-900 border border-gray-800 rounded-lg text-gray-100 text-sm focus:border-aether-500 focus:ring-1 focus:ring-aether-500/50 outline-none transition-colors"
          value="400"
        >
      </div>

      <div class="mt-2 flex gap-3">
        <div class="flex-1">
          <label class="block text-sm text-gray-400 mb-1.5" for="preview-max-height">Max Height (vh)</label>
          <input
            id="preview-max-height"
            type="number"
            min="20"
            max="100"
            step="5"
            class="w-full px-3 py-2 bg-gray-900 border border-gray-800 rounded-lg text-gray-100 text-sm focus:border-aether-500 focus:ring-1 focus:ring-aether-500/50 outline-none transition-colors"
            value="85"
          >
        </div>
        <div class="flex-1">
          <label class="block text-sm text-gray-400 mb-1.5" for="preview-max-width">Max Width (vw)</label>
          <input
            id="preview-max-width"
            type="number"
            min="20"
            max="100"
            step="5"
            class="w-full px-3 py-2 bg-gray-900 border border-gray-800 rounded-lg text-gray-100 text-sm focus:border-aether-500 focus:ring-1 focus:ring-aether-500/50 outline-none transition-colors"
            value="50"
          >
        </div>
      </div>
    </div>

    <!-- Save Button -->
    <button
      id="save-btn"
      type="button"
      class="w-full py-2.5 px-4 bg-aether-600 hover:bg-aether-500 text-white font-medium rounded-xl transition-all duration-200 hover:shadow-fab active:scale-[0.98]"
    >
      Save Settings
    </button>

    <p id="status-msg" class="text-xs text-center mt-3 text-gray-500 h-4"></p>
  </div>

  <!-- No inline JS! All logic in external popup.js -->
  <script src="popup.js"></script>
</body>
</html>
