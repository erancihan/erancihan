<div class="overflow-x-auto rounded-lg border border-slate-800">
  <table class="min-w-full text-sm">
    <thead class="bg-slate-900/70 text-slate-400">
      <tr>
        <th class="px-3 py-2 text-left font-medium">time</th>
        <th class="px-3 py-2 text-left font-medium">symbol</th>
        <th class="px-3 py-2 text-left font-medium">side</th>
        <th class="px-3 py-2 text-right font-medium">qty</th>
        <th class="px-3 py-2 text-left font-medium">mode</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-800">
      {% for o in orders %}
        <tr>
          <td class="px-3 py-2 text-slate-400">{{ o.ts[:19]|replace("T", " ") }}</td>
          <td class="px-3 py-2 font-medium text-slate-100">{{ o.symbol }}</td>
          <td class="px-3 py-2 {{ 'text-emerald-400' if o.side == 'buy' else 'text-rose-400' }}">{{ o.side }}</td>
          <td class="px-3 py-2 text-right tabular-nums">{{ "%.4f"|format(o.qty) }}</td>
          <td class="px-3 py-2 text-slate-400">{{ o.mode }}</td>
        </tr>
      {% else %}
        <tr><td colspan="5" class="px-3 py-6 text-center text-slate-500">No orders recorded yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
