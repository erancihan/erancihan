{% if account.positions %}
  <div class="overflow-x-auto rounded-lg border border-slate-800">
    <table class="min-w-full text-sm">
      <thead class="bg-slate-900/70 text-slate-400">
        <tr>
          <th class="px-3 py-2 text-left font-medium">symbol</th>
          <th class="px-3 py-2 text-right font-medium">qty</th>
          <th class="px-3 py-2 text-right font-medium">avg price</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-800">
        {% for p in account.positions %}
          <tr>
            <td class="px-3 py-2 font-medium text-slate-100">{{ p.symbol }}</td>
            <td class="px-3 py-2 text-right tabular-nums">{{ "%.4f"|format(p.qty) }}</td>
            <td class="px-3 py-2 text-right tabular-nums">{{ p.avg_price | money }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <div class="rounded-lg border border-dashed border-slate-800 p-6 text-center text-slate-500">
    No open positions{% if account.source != 'alpaca' %} (live positions need Alpaca credentials){% endif %}.
  </div>
{% endif %}
