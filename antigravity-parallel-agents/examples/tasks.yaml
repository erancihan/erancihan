# Example batch for `swarm run` (Phase 3). Each task becomes one parallel agent.
concurrency: 4
budgetUsd: 5.00
# Shared playbook applied to every lane (overridable per task):
agentsMd: ./AGENTS.md
tasks:
  - "Add cursor-based pagination to the /users endpoint and write tests"
  - "Migrate the build from webpack to vite, keep all scripts working"
  - "Audit the repo for unhandled promise rejections and fix them"
  - prompt: "Write a README for the payments module"
    agentsMd: ./docs/payments-playbook.md   # per-task override
