name: trading-bot CI

on:
  push:
    paths:
      - 'trading-bot/**'
      - '.github/workflows/trading-bot-ci.yml'
  pull_request:
    paths:
      - 'trading-bot/**'
      - '.github/workflows/trading-bot-ci.yml'

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading-bot
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package (with dev + web extras)
        run: pip install -e ".[dev,web]"

      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading-bot/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: trading-bot/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build bundle
        run: npm run build
