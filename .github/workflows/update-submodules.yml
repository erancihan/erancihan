name: Update Submodules

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-submodules:
    name: Update submodule references
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Update all submodules to latest remote HEAD
        run: |
          git submodule update --remote --merge

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated submodule references
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Build a descriptive commit message listing what changed
          CHANGED_SUBMODULES=$(git diff --name-only)
          COMMIT_MSG="chore: update submodule references"
          COMMIT_BODY=""
          for sub in $CHANGED_SUBMODULES; do
            NEW_SHA=$(git diff "$sub" | grep '+Subproject commit' | awk '{print $3}' | cut -c1-7)
            COMMIT_BODY="${COMMIT_BODY}\n- ${sub} → ${NEW_SHA}"
          done

          git add -A
          git commit -m "$COMMIT_MSG" -m "$(echo -e "$COMMIT_BODY")"
          git push
