<!-- Sticky header with statement month navigation and settings -->
<header class="sticky top-0 z-40 bg-slate-950/95 backdrop-blur-md transition-all duration-300 mb-8 border-b border-slate-800/50"
        :class="scrolled ? 'py-3 shadow-xl' : 'py-6'"
        @scroll.window="scrolled = (window.pageYOffset > 20)">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between flex-wrap gap-4">
        <div>
            <h1 class="font-bold gradient-text transition-all duration-300"
                :class="scrolled ? 'text-2xl' : 'text-3xl'">Expense Analysis</h1>
            <p class="text-slate-400 mt-1 text-sm transition-all duration-300"
               :class="scrolled ? 'opacity-0 h-0 overflow-hidden' : 'opacity-100'" x-text="summaryLabel"></p>
        </div>

        <!-- Statement Month & Settings -->
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1 glass-card rounded-xl px-4 py-2">
                <label class="text-xs text-slate-400 uppercase tracking-wider font-medium mr-1">Statement</label>
                <button @click="shiftStatementMonth(-1)" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 transition-colors focus:outline-none" title="Previous Month">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <input type="month" x-model="statementMonth" @change="applyDateRange()"
                       class="bg-transparent text-sm focus:outline-none font-medium text-slate-200 w-32 text-center">
                <button @click="shiftStatementMonth(1)" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 transition-colors focus:outline-none" title="Next Month">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
            <!-- Settings Button -->
            <button @click="settingsModalOpen = true" class="p-2.5 glass-card rounded-xl text-slate-400 hover:text-indigo-400 transition-colors focus:outline-none" title="Settings">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>

            <!-- Account / Logout -->
            {% if current_user.is_authenticated %}
            <form method="POST" action="{{ url_for('auth.logout') }}">
                <button type="submit"
                        class="p-2.5 glass-card rounded-xl text-slate-400 hover:text-red-400 transition-colors focus:outline-none"
                        title="Sign out ({{ current_user.email }})">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </form>
            {% endif %}
        </div>
    </div>
</header>
