<!-- Expense Details / Manage Tags Modal -->
<div x-show="manageTagsModalOpen" style="display: none;" class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <!-- Background overlay -->
        <div x-show="manageTagsModalOpen" class="fixed inset-0 transition-opacity bg-slate-900/80 backdrop-blur-sm" aria-hidden="true" @click="manageTagsModalOpen = false"></div>

        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <!-- Modal panel -->
        <div x-show="manageTagsModalOpen"
             class="inline-block px-4 pt-5 pb-4 overflow-hidden text-left align-bottom transition-all transform glass-card border border-slate-700 rounded-2xl shadow-xl sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6"
             @keydown.escape.window="manageTagsModalOpen = false"
             @keydown.left.window="if (manageTagsModalOpen && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') prevExpense()"
             @keydown.right.window="if (manageTagsModalOpen && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') nextExpense()">
            <div>
                <!-- Header with navigation -->
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-medium leading-6 text-slate-200" id="modal-title">Expense Details</h3>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-500" x-text="expenseNavLabel"></span>
                        <button @click="prevExpense()" :disabled="!hasPrevExpense"
                                class="p-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 transition-colors disabled:opacity-30 disabled:cursor-not-allowed focus:outline-none" title="Previous (←)">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button @click="nextExpense()" :disabled="!hasNextExpense"
                                class="p-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 transition-colors disabled:opacity-30 disabled:cursor-not-allowed focus:outline-none" title="Next (→)">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
                
                <!-- Expense Info -->
                <div class="bg-slate-800/40 rounded-lg p-3 border border-slate-700/50 mb-6 flex flex-col gap-1" x-show="currentExpense">
                    <div class="flex justify-between items-start">
                        <span class="text-slate-200 font-medium" x-text="currentExpense?.description"></span>
                        <span class="font-mono text-sm" :class="(currentExpense?.amount < 0) ? 'text-emerald-400' : 'text-slate-200'" x-text="currentExpense ? formatAmount(currentExpense.amount, currentExpense.currency) : ''"></span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-slate-500">
                        <span x-text="currentExpense?.date"></span>
                        <span x-text="currentExpense?.card_number"></span>
                    </div>
                </div>

                <!-- Current Tags List -->
                <div class="mt-4 mb-6 relative">
                    <label class="block text-xs text-slate-500 mb-2">Current Tags</label>
                    
                    <!-- Details Loading Spinner -->
                    <div x-show="detailsLoading" class="absolute inset-0 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm rounded-lg z-10">
                        <svg class="animate-spin h-5 w-5 text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                    </div>

                    <div class="space-y-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                        <template x-for="tag in currentExpense?.tags" :key="tag.id">
                            <div class="flex items-center justify-between bg-slate-800/40 rounded-lg p-2 border border-slate-700/50 group">
                                <div class="flex flex-col gap-1">
                                    <div class="flex items-center gap-2">
                                        <span class="inline-flex items-center gap-0.5 px-2 py-0.5 rounded-full text-xs font-medium"
                                              :class="tag.source === 'suppressed' ? 'opacity-50 line-through' : ''"
                                              :style="'background-color:' + tag.color + '22; color:' + tag.color + '; border: 1px solid ' + tag.color + '44'">
                                            <span x-text="tag.icon"></span>
                                            <span x-text="tag.name"></span>
                                        </span>
                                        <span class="text-[10px] text-slate-500 uppercase tracking-wider" x-text="tag.source"></span>
                                    </div>
                                    <!-- Matching Rule Info -->
                                    <template x-if="tag.rule_pattern">
                                        <div class="text-[10px] text-slate-500 italic pl-1 flex gap-1">
                                            <span>matched rule:</span>
                                            <span class="font-mono text-slate-400" x-text="tag.rule_pattern"></span>
                                            <span x-text="'(' + tag.rule_match_type + ')'"></span>
                                        </div>
                                    </template>
                                    <!-- Fallback if rule no longer matches or was deleted -->
                                    <template x-if="!tag.rule_pattern && tag.source !== 'manual'">
                                        <div class="text-[10px] text-slate-500 italic pl-1 flex gap-1">
                                            <span>No active rule matches (rule deleted or edited)</span>
                                        </div>
                                    </template>
                                </div>
                                <div class="flex items-center gap-1">
                                    <!-- Suppress Auto Tag (Eye-Slash) -->
                                    <button x-show="tag.source !== 'suppressed'" @click="removeTag(currentExpense.id, tag.id)" class="p-1.5 text-slate-400 hover:text-amber-400 rounded-md hover:bg-slate-700 transition-colors" title="Suppress Auto Tag">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
                                    </button>
                                    
                                    <!-- Restore Tag (Eye) -->
                                    <button x-show="tag.source === 'suppressed'" @click="unsuppressTag(currentExpense.id, tag.id)" class="p-1.5 text-slate-400 hover:text-emerald-400 rounded-md hover:bg-slate-700 transition-colors" title="Restore Tag">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                    </button>
                                    
                                    <!-- Delete Rule (Trash) - Shows if this is an auto-tag from a rule -->
                                    <button x-show="tag.rule_pattern" @click="deleteRule(tag.rule_id)" class="p-1.5 text-slate-400 hover:text-rose-400 rounded-md hover:bg-slate-700 transition-colors" title="Delete Auto Rule">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                    
                                    <!-- Hard Delete Tag (Trash) - Shows if NO rule exists (manual or suppressed) -->
                                    <button x-show="!tag.rule_pattern && (tag.source === 'suppressed' || tag.source === 'manual')" @click="hardDeleteTag(currentExpense.id, tag.id)" class="p-1.5 text-slate-400 hover:text-rose-400 rounded-md hover:bg-slate-700 transition-colors" title="Permanently Delete Tag">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                        <div x-show="!currentExpense?.tags?.length" class="text-sm text-slate-500 italic py-2">No tags applied</div>
                    </div>
                </div>

                <!-- Create Auto Rule -->
                <div class="border-t border-slate-700/50 pt-4">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-3">Create Auto Rule</label>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">Pattern</label>
                            <input type="text" x-model="quickTagForm.pattern"
                                   class="w-full bg-slate-800/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-200">
                        </div>
                        <div class="flex gap-3">
                            <div class="flex-1">
                                <label class="block text-xs text-slate-500 mb-1">Tag</label>
                                <select x-model="quickTagForm.tag_id"
                                        class="w-full bg-slate-800/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-200">
                                    <option value="">Select...</option>
                                    <template x-for="tag in tags" :key="tag.id">
                                        <option :value="tag.id" x-text="tag.icon + ' ' + tag.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="flex-1">
                                <label class="block text-xs text-slate-500 mb-1">Match Type</label>
                                <select x-model="quickTagForm.match_type"
                                        class="w-full bg-slate-800/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-200">
                                    <option value="contains">contains</option>
                                    <option value="starts_with">starts_with</option>
                                    <option value="regex">regex</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button type="button" @click="manageTagsModalOpen = false"
                        class="px-4 py-2 text-sm font-medium text-slate-300 bg-transparent border border-slate-600 rounded-lg hover:bg-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-slate-500 transition-colors">
                    Close
                </button>
                <button type="button" @click="submitQuickTag()" :disabled="!quickTagForm.pattern || !quickTagForm.tag_id"
                        class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 border border-transparent rounded-lg hover:bg-indigo-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-indigo-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Create Rule
                </button>
            </div>
        </div>
    </div>
</div>
