<!-- Edit Tag Modal -->
<div x-show="editTagModalOpen" style="display: none;" class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <!-- Background overlay -->
        <div x-show="editTagModalOpen" class="fixed inset-0 transition-opacity bg-slate-900/80 backdrop-blur-sm" aria-hidden="true" @click="editTagModalOpen = false"></div>

        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <!-- Modal panel -->
        <div x-show="editTagModalOpen"
             class="inline-block px-4 pt-5 pb-4 overflow-hidden text-left align-bottom transition-all transform glass-card border border-slate-700 rounded-2xl shadow-xl sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6"
             @keydown.escape.window="editTagModalOpen = false">
            <div>
                <h3 class="text-lg font-medium leading-6 text-slate-200" id="modal-title">Edit Tag</h3>
                <div class="mt-4 space-y-4">
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="block text-xs text-slate-500 mb-1">Name</label>
                            <input type="text" x-model="editTagForm.name"
                                   class="w-full bg-slate-800/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-200">
                        </div>
                        <div class="w-20">
                            <label class="block text-xs text-slate-500 mb-1">Icon</label>
                            <input type="text" x-model="editTagForm.icon"
                                   class="w-full bg-slate-800/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-200 text-center">
                        </div>
                        <div class="w-24">
                            <label class="block text-xs text-slate-500 mb-1">Color</label>
                            <input type="color" x-model="editTagForm.color"
                                   class="w-full h-[38px] bg-slate-800/60 border border-slate-700 rounded-lg px-1 py-1 cursor-pointer focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>

                    <div class="pt-4 mt-4 border-t border-slate-700/50">
                        <h4 class="text-sm font-medium text-slate-300 mb-2">Merge Tag</h4>
                        <p class="text-xs text-slate-500 mb-3">Merge this tag into another one. This will re-assign all rules and expenses, then delete this tag.</p>
                        <div class="flex gap-3">
                            <select x-model="editTagForm.merge_target_id"
                                    class="flex-1 bg-slate-800/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-200">
                                <option value="">Select target tag...</option>
                                <template x-for="t in tags" :key="t.id">
                                    <option :value="t.id" x-show="t.id !== editTagForm.id" x-text="t.icon + ' ' + t.name"></option>
                                </template>
                            </select>
                            <button type="button" @click="submitMergeTag()" :disabled="!editTagForm.merge_target_id"
                                    class="px-4 py-2 text-sm font-medium text-amber-400 bg-amber-600/20 border border-amber-600/30 rounded-lg hover:bg-amber-600/30 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                                Merge
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-8 flex justify-between">
                <button type="button" @click="deleteTag(editTagForm.id)"
                        class="px-3 py-1.5 text-sm font-medium text-rose-400 hover:text-rose-300 transition-colors">
                    Delete Tag
                </button>
                <div class="flex gap-3">
                    <button type="button" @click="editTagModalOpen = false"
                            class="px-4 py-2 text-sm font-medium text-slate-300 bg-transparent border border-slate-600 rounded-lg hover:bg-slate-800 transition-colors">
                        Cancel
                    </button>
                    <button type="button" @click="submitEditTag()" :disabled="!editTagForm.name"
                            class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 border border-transparent rounded-lg hover:bg-indigo-500 transition-colors disabled:opacity-50">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
