<!-- Settings Modal -->
<div x-show="settingsModalOpen" style="display: none;" class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <!-- Background overlay -->
        <div x-show="settingsModalOpen" class="fixed inset-0 transition-opacity bg-slate-900/80 backdrop-blur-sm" aria-hidden="true" @click="settingsModalOpen = false"></div>

        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <!-- Modal panel -->
        <div x-show="settingsModalOpen"
             class="inline-block px-4 pt-5 pb-4 overflow-hidden text-left align-bottom transition-all transform glass-card border border-slate-700 rounded-2xl shadow-xl sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6"
             @keydown.escape.window="settingsModalOpen = false">
            <div>
                <h3 class="text-lg font-medium leading-6 text-slate-200" id="modal-title">Settings</h3>
                
                <div class="mt-6 space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Statement Cutoff Day</label>
                        <div class="flex items-center gap-3">
                            <input type="number" min="1" max="31" x-model.number="statementCutoffDay" @change="saveCutoffDay()"
                                   class="w-24 bg-slate-800/60 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-200">
                            <span class="text-sm text-slate-500">Day of the month (1-31)</span>
                        </div>
                        <p class="mt-2 text-xs text-slate-500">The day your credit card statement is generated. Used to calculate the active monthly window.</p>
                    </div>

                    <!-- Gmail connection (shown only when an OAuth client is configured) -->
                    <div x-show="gmailAvailable" class="border-t border-slate-700/50 pt-6">
                        <label class="block text-sm font-medium text-slate-300 mb-2">Gmail Connection</label>
                        <div class="flex items-center justify-between gap-3">
                            <span x-show="gmailConnected" class="inline-flex items-center gap-1.5 text-sm text-emerald-400">
                                <span class="w-2 h-2 rounded-full bg-emerald-400"></span> Connected
                            </span>
                            <span x-show="!gmailConnected" class="inline-flex items-center gap-1.5 text-sm text-slate-500">
                                <span class="w-2 h-2 rounded-full bg-slate-600"></span> Not connected
                            </span>
                            <a x-show="!gmailConnected" href="/gmail/connect"
                               class="px-3 py-1.5 text-sm bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg transition-colors">Connect Gmail</a>
                            <button x-show="gmailConnected" @click="disconnectGmail()"
                                    class="px-3 py-1.5 text-sm bg-slate-700 hover:bg-red-600 text-slate-200 rounded-lg transition-colors">Disconnect</button>
                        </div>
                        <p class="mt-2 text-xs text-slate-500">Connect your Gmail so statements import automatically into your account.</p>
                    </div>
                </div>
            </div>
            <div class="mt-8 flex justify-end">
                <button type="button" @click="settingsModalOpen = false"
                        class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 border border-transparent rounded-lg hover:bg-indigo-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-indigo-500 transition-colors">
                    Close
                </button>
            </div>
        </div>
    </div>
</div>
