<!-- Stats summary cards -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <div class="glass-card rounded-xl p-4">
        <p class="text-xs text-slate-400 uppercase tracking-wider font-medium">Total Spent</p>
        <p class="text-2xl font-bold text-emerald-400 mt-1" x-text="formatCurrency(totalSpent)"></p>
    </div>
    <div class="glass-card rounded-xl p-4">
        <p class="text-xs text-slate-400 uppercase tracking-wider font-medium">Transactions</p>
        <p class="text-2xl font-bold text-blue-400 mt-1" x-text="totalCount.toLocaleString()"></p>
    </div>
    <div class="glass-card rounded-xl p-4">
        <p class="text-xs text-slate-400 uppercase tracking-wider font-medium">Avg / Month</p>
        <p class="text-2xl font-bold text-amber-400 mt-1" x-text="formatCurrency(avgMonthly)"></p>
    </div>
    <div class="glass-card rounded-xl p-4">
        <p class="text-xs text-slate-400 uppercase tracking-wider font-medium">Payments</p>
        <p class="text-2xl font-bold text-rose-400 mt-1" x-text="formatCurrency(totalPayments)"></p>
    </div>
</div>
